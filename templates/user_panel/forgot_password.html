{% extends 'user_panel/base.html' %}

{% block title %}Reset Password - QGenie.AI{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card glass-card p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center bg-gradient rounded-circle mb-3" style="width: 60px; height: 60px; background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); box-shadow: 0 5px 20px var(--accent-glow);">
                    <i class="bi bi-shield-lock-fill text-white fs-3"></i>
                </div>
                <h2 class="text-white fw-bold">Reset Password</h2>
                <p class="text-secondary small">Enter your username or registered email address. We will send you a 6-digit secure OTP code to reset your password.</p>
            </div>

            <form method="post" action="{% url 'forgot_password' %}">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label for="identifier" class="form-label text-secondary fw-semibold">Username or Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark-input text-secondary border-secondary"><i class="bi bi-envelope"></i></span>
                        <input type="text" name="identifier" id="identifier" class="form-control bg-dark-input text-white border-secondary" placeholder="Enter username or email" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-premium w-100 py-2.5">
                    <i class="bi bi-send me-1"></i> Send OTP Code
                </button>
            </form>

            <div class="text-center mt-4 border-top border-secondary pt-3">
                <a href="{% url 'login' %}" class="text-secondary text-decoration-none fw-bold small"><i class="bi bi-arrow-left me-1"></i> Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
